<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WealthGrow Calculator</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="background"></div>

  <div class="container">

    <header>
      <h1>WealthGrow</h1>
      <p>Compound Interest & Future Value Planner</p>
    </header>

    <div class="calculator-card">

      <div class="input-group">
        <label>Initial Investment</label>
        <input type="number" id="principal" placeholder="100000">
      </div>

      <div class="input-group">
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="12">
      </div>

      <div class="input-group">
        <label>Investment Period (Years)</label>
        <input type="number" id="years" placeholder="10">
      </div>

      <div class="input-group">
        <label>Monthly Contribution</label>
        <input type="number" id="monthly" placeholder="5000">
      </div>

      <button onclick="calculateInvestment()">
        Calculate Growth
      </button>

    </div>

    <div class="results">

      <div class="result-card">
        <h3>Future Value</h3>
        <h1 id="futureValue">₹0</h1>
      </div>

      <div class="result-card">
        <h3>Total Invested</h3>
        <h1 id="invested">₹0</h1>
      </div>

      <div class="result-card">
        <h3>Total Profit</h3>
        <h1 id="profit">₹0</h1>
      </div>

    </div>

    <div class="chart-card">
      <canvas id="growthChart"></canvas>
    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
